<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ page_title }}</title>
  <style>
    body {
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(180deg, #f4f7ff 0%, #ffffff 100%);
      color: #102a43;
    }

    .page {
      max-width: 920px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }
    /*wai_1f3ae2.0bdeb1c690d46288ef84febce068e9fe69f8c5b133dd2c4f*/
    header {
      display: grid;
      gap: 1rem;
      margin-bottom: 2rem;
      padding: 1rem 1.5rem;
      background: rgba(15, 98, 254, 0.08);
      border: 1px solid rgba(15, 98, 254, 0.12);
      border-radius: 24px;
      box-shadow: 0 16px 30px rgba(15, 98, 254, 0.08);
    }

    h1 {
      font-size: clamp(2rem, 3vw, 3rem);
      margin: 0;
      letter-spacing: -0.03em;
    }

    p.lead {
      color: #334e68;
      line-height: 1.8;
      margin: 0;
      max-width: 720px;
    }

    .panel {
      background: #ffffff;
      border: 1px solid #d9e2ec;
      border-radius: 24px;
      padding: 2rem;
      box-shadow: 0 16px 40px rgba(16, 42, 67, 0.08);
    }

    .panel h2 {
      margin-top: 0;
      margin-bottom: 0.75rem;
      font-size: 1.5rem;
      color: #102a43;
    }

    .panel p {
      margin: 0 0 1.4rem;
      color: #486581;
    }

    .form-grid {
      display: grid;
      gap: 1rem;
    }

    .field-group {
      display: grid;
      gap: 0.75rem;
    }

    label {
      display: block;
      font-weight: 600;
      color: #102a43;
    }

    .input-field,
    .select-field {
      width: 100%;
      padding: 1rem 1.1rem;
      border: 1px solid #cbd6e2;
      border-radius: 16px;
      font-size: 1rem;
      color: #102a43;
      background: #f8fbff;
    }

    .input-row {
      display: grid;
      gap: 1rem;
      grid-template-columns: 1.5fr 1fr;
      align-items: end;
    }

    .button-primary {
      background: linear-gradient(135deg, #0f62fe 0%, #6f7cff 100%);
      color: #ffffff;
      border: none;
      border-radius: 16px;
      padding: 1rem 1.4rem;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
      box-shadow: 0 14px 30px rgba(15, 98, 254, 0.18);
    }

    .button-primary:hover {
      transform: translateY(-1px);
      opacity: 0.95;
    }

    .output-box {
      white-space: pre-wrap;
      word-break: break-word;
      background: linear-gradient(180deg, #f0f4ff 0%, #eef4ff 100%);
      padding: 1.3rem;
      border-radius: 18px;
      min-height: 240px;
      overflow-x: auto;
      border: 1px solid #cbd6e2;
      color: #102a43;
    }

    .section-grid {
      display: grid;
      gap: 1.5rem;
    }

    footer {
      margin-top: 3rem;
      color: #627d98;
      font-size: 0.95rem;
    }

    .content {
      display: grid;
      gap: 1.5rem;
    }
  </style>
</head>
<body>
  <main class="page">
    <header>
      <h1>{{ header }}</h1>
      <p class="lead">{{ description }}</p>
    </header>
    <div class="content">
      {% block content %}{% endblock %}
    </div>
    <footer>
      Built with Flask and Weather-AI. Open source landing page template.
    </footer>
  </main>
</body>
</html>
